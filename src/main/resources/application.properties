spring.application.name=kintai

# データベース接続設定
spring.datasource.url=jdbc:postgresql://db.qcczptbzrstsltqhlxxo.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Hackathon2026!

# データベースの自動更新設定
spring.jpa.hibernate.ddl-auto=update
# SQLをログに出す
spring.jpa.show-sql=true
# ポスグレを使う宣言
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =================================================================
# 🌐 国際化（多言語対応 i18n）の決定版設定
# =================================================================
# 1. メッセージファイルのベース名を「messages」に固定
spring.messages.basename=messages

# 2. メッセージファイルの文字コードを UTF-8 に強制指定（文字化け・ハテナ化防止）
spring.messages.encoding=UTF-8

# 3. リクエストされた言語のファイル（_en等）がない場合、デフォルト（messages_ja）を強制使用
spring.messages.fallback-to-system-locale=true

# 4. 翻訳キーが見つからない場合、エラーコード（_jaなど）を露出させずにキー名そのものを返す
spring.messages.use-code-as-default-message=true