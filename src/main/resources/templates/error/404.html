<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found | KINTAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 先ほどのerror.htmlと同じCSSをそのまま使えます */
        body { background-color: #f8f9fa; color: #333; }
        .error-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: #ffffff; border-radius: 12px; padding: 40px; text-align: center; max-width: 500px; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <h1 class="text-warning mb-3">404</h1>
            <h3 class="mb-3">ページが見つかりません</h3>
            <p class="text-muted mb-4">アクセスしようとしたURLが存在しないか、移動した可能性があります。</p>
            <a href="/" class="btn btn-dark w-100">ログイン画面へ戻る</a>
        </div>
    </div>
</body>
</html>
