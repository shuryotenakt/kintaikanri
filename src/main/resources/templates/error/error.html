<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | KINTAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            text-align: center;
        }
        .error-title {
            font-weight: 700;
            font-size: 1.5rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .btn-primary {
            background-color: #1a1a1a;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            margin-top: 20px;
        }
        .btn-primary:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <h1 class="error-title">システムエラーが発生しました</h1>
            
            <p class="text-muted mb-4" th:if="${errorMessage}" th:text="${errorMessage}">
                予期せぬエラーが発生しました。
            </p>
            <p class="text-muted mb-4" th:unless="${errorMessage}">
                申し訳ありませんが、もう一度やり直すか、管理者にお問い合わせください。
            </p>

            <a href="/login" class="btn btn-primary w-100">ログイン画面へ戻る</a>
        </div>
    </div>
</body>
</html>
