<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード | Prime Worker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; }
        .edit-panel {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 8px;
            display: inline-block;
        }
        .delete-col {
            transition: all 0.3s;
        }
        .password-toggle-btn {
            border: 1px solid #dee2e6;
            border-left: none;
            background: #fff;
            color: #888;
        }
        .password-toggle-btn:hover {
            background: #f8f9fa;
            color: #333;
        }
        .form-control:focus + .password-toggle-btn {
            border-color: #86b7fe;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <!-- セッションチェックを厳格化してエラーを防止 -->
            <span class="navbar-brand">
                管理者ダッシュボード
                <th:block th:if="${session != null and session.user != null}">
                    （ログイン中：<span th:text="${session.user.name}"></span>）
                </th:block>
            </span>
            <div class="d-flex gap-2">
                <a href="/partner" class="btn btn-outline-warning btn-sm">⬅ 打刻画面へ</a>
                <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="row">
            <!-- 左サイドバー: ユーザー管理 -->
            <div class="col-md-3">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">新規ユーザー登録</div>
                    <div class="card-body">
                        <form action="/admin/register" method="post" autocomplete="off">
                            <input type="hidden" name="filterUserId" th:value="${selectedUserId}">
                            <input type="hidden" name="filterMonth" th:value="${selectedMonth}">
                            <input type="hidden" name="filterStartDate" th:value="${selectedStartDate}">
                            <input type="hidden" name="filterEndDate" th:value="${selectedEndDate}">
                            
                            <div class="mb-2">
                                <input type="text" name="name" id="regName" class="form-control" placeholder="氏名" required autocomplete="off">
                            </div>
                            
                            <div class="input-group mb-2">
                                <input type="password" name="password" id="regPassword" class="form-control" placeholder="パスワード" required autocomplete="new-password">
                                <button class="btn password-toggle-btn" type="button" id="toggleRegPassword">
                                    <i class="bi bi-eye-slash" id="regEyeIcon"></i>
                                </button>
                            </div>

                            <select name="role" class="form-select mb-3">
                                <option value="PARTNER">パートナー社員</option>
                                <option value="ADMIN">管理者</option>
                            </select>
                            <button type="submit" class="btn btn-primary w-100">登録</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">従業員管理</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="u : ${userList}">
                            <span>
                                <span class="fw-bold" th:text="${u.name}"></span>
                                <span class="text-muted small">（<span th:text="${u.userId}"></span>）</span>
                                <span th:if="${u.role == 'ADMIN'}" class="badge bg-warning text-dark ms-1">Admin</span>
                            </span>
                            <button class="btn btn-outline-danger btn-sm" 
                                    data-bs-toggle="modal" 
                                    data-bs-target="#deleteModal"
                                    th:data-id="${u.id}" 
                                    th:data-name="${u.name}"
                                    onclick="setDeleteTarget(this)">
                                削除
                            </button>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 右メイン: 打刻履歴 -->
            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <div class="fw-bold mb-2">打刻履歴管理</div>
                        <form action="/admin" method="get" id="filterForm" class="d-flex flex-wrap align-items-center gap-3 bg-light p-2 rounded border">
                            <div class="d-flex align-items-center gap-1">
                                <span class="small fw-bold text-muted text-nowrap">従業員:</span>
                                <select name="userId" class="form-select form-select-sm" style="width: 150px;" onchange="document.getElementById('filterForm').submit()">
                                    <option value="">全員を表示</option>
                                    <option th:each="u : ${userList}" th:value="${u.userId}" th:text="${u.name} + ' (' + ${u.userId} + ')'" th:selected="${u.userId == selectedUserId}"></option>
                                </select>
                            </div>
                            <div class="d-flex align-items-center gap-1 border-start ps-3">
                                <span class="small fw-bold text-muted text-nowrap">月:</span>
                                <input type="month" name="month" id="monthInput" th:value="${selectedMonth}" class="form-control form-control-sm" onchange="onMonthChange()">
                            </div>
                            <div class="d-flex align-items-center gap-1 border-start ps-3">
                                <span class="small fw-bold text-muted text-nowrap">日付:</span>
                                <input type="date" name="startDate" id="startDateInput" th:value="${selectedStartDate}" class="form-control form-control-sm" onchange="onDateChange()">
                                <span class="text-muted">～</span>
                                <input type="date" name="endDate" id="endDateInput" th:value="${selectedEndDate}" class="form-control form-control-sm" onchange="onDateChange()">
                            </div>
                            <div class="ms-auto">
                                <a href="/admin" class="btn btn-outline-secondary btn-sm">クリア</a>
                            </div>
                        </form>
                    </div>

                    <div class="card-body border-bottom py-2 bg-white d-flex justify-content-between align-items-center">
                        <div>
                            <button type="button" class="btn btn-success btn-sm fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#createAttendanceModal">
                                ➕ 新規打刻登録
                            </button>
                            <button type="button" class="btn btn-outline-danger btn-sm fw-bold shadow-sm ms-2" id="deleteModeBtn" onclick="toggleDeleteMode()">
                                🗑️ 削除モードON
                            </button>
                        </div>
                        <div>
                            <button type="submit" form="deleteForm" id="executeDeleteBtn" class="btn btn-danger btn-sm fw-bold shadow-sm d-none" onclick="return confirm('選択した項目を削除しますか？')">
                                チェックした項目を削除
                            </button>
                        </div>
                    </div>
                    
                    <form id="deleteForm" action="/admin/delete-attendances" method="post">
                        <input type="hidden" name="filterUserId" th:value="${selectedUserId}">
                        <input type="hidden" name="filterMonth" th:value="${selectedMonth}">
                        <input type="hidden" name="filterStartDate" th:value="${selectedStartDate}">
                        <input type="hidden" name="filterEndDate" th:value="${selectedEndDate}">
                    </form>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="delete-col d-none text-center" style="width: 5%;">
                                        <input type="checkbox" id="selectAll" class="form-check-input" onclick="toggleAllCheckboxes(this)">
                                    </th>
                                    <th style="width: 15%;">名前(ID)</th>
                                    <th style="width: 80%;">勤務実績 / 修正フォーム</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="h : ${histories}">
                                    <td class="delete-col d-none text-center">
                                        <input class="form-check-input attendance-checkbox" type="checkbox" name="attendanceIds" th:value="${h.id}" form="deleteForm">
                                    </td>
                                    <td>
                                        <span class="fw-bold" th:text="${h.userName}"></span><br>
                                        <small class="text-muted">ID: <span th:text="${h.userId}"></span></small>
                                    </td>
                                    <td>
                                        <div class="mb-2">
                                            <span class="badge bg-secondary mb-1">記録</span><br>
                                            <span class="fs-6 fw-bold text-dark">
                                                <span th:text="${#temporals.format(h.startTime, 'yyyy/MM/dd HH:mm')}"></span>
                                                <span class="text-muted mx-1">～</span>
                                                <span th:text="${h.endTime != null ? #temporals.format(h.endTime, 'yyyy/MM/dd HH:mm') : '未退勤'}"></span>
                                            </span>
                                            <span class="ms-3 text-muted fw-bold small">休憩:</span>
                                            <span class="badge bg-info text-dark" th:text="${h.breakTimeDisplay}"></span>
                                            <span class="ms-2 text-muted fw-bold small">実労働:</span>
                                            <span class="badge bg-success" th:text="${h.workTime}"></span>
                                        </div>

                                        <div class="edit-panel">
                                            <form action="/admin/edit" method="post" class="d-flex align-items-center gap-2 m-0 flex-wrap">
                                                <input type="hidden" name="filterUserId" th:value="${selectedUserId}">
                                                <input type="hidden" name="filterMonth" th:value="${selectedMonth}">
                                                <input type="hidden" name="filterStartDate" th:value="${selectedStartDate}">
                                                <input type="hidden" name="filterEndDate" th:value="${selectedEndDate}">
                                                
                                                <input type="hidden" name="id" th:value="${h.id}">
                                                <span class="text-muted small fw-bold">修正:</span>
                                                <input type="datetime-local" name="startTime" th:value="${#temporals.format(h.startTime, 'yyyy-MM-dd''T''HH:mm')}" class="form-control form-control-sm" style="width: auto;">
                                                <span class="text-muted small">～</span>
                                                <input type="datetime-local" name="endTime" th:value="${h.endTime != null ? #temporals.format(h.endTime, 'yyyy-MM-dd''T''HH:mm') : ''}" class="form-control form-control-sm" style="width: auto;">
                                                
                                                <span class="text-muted small ms-2 fw-bold">休憩(分):</span>
                                                <input type="number" name="breakMinutes" th:value="${h.calculatedBreakMinutes}" class="form-control form-control-sm" style="width: 70px;" min="0">
                                                
                                                <button type="submit" class="btn btn-warning btn-sm fw-bold shadow-sm ms-2">上書き保存</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(histories)}">
                                    <td colspan="3" class="text-center text-muted py-4">履歴が見つかりません</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- モーダル: 新規打刻登録 -->
    <div class="modal fade" id="createAttendanceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">新規打刻の登録</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form action="/admin/create-attendance" method="post">
                        <input type="hidden" name="filterUserId" th:value="${selectedUserId}">
                        <input type="hidden" name="filterMonth" th:value="${selectedMonth}">
                        <input type="hidden" name="filterStartDate" th:value="${selectedStartDate}">
                        <input type="hidden" name="filterEndDate" th:value="${selectedEndDate}">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">対象ユーザー</label>
                            <select name="targetUserId" class="form-select" required>
                                <option value="" disabled selected>選択してください</option>
                                <option th:each="u : ${userList}" th:value="${u.userId}" th:text="${u.name} + ' (' + ${u.userId} + ')'"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">出勤時間</label>
                            <input type="datetime-local" name="startTime" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">退勤時間（未退勤の場合は空欄）</label>
                            <input type="datetime-local" name="endTime" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">休憩時間（分）</label>
                            <input type="number" name="breakMinutes" class="form-control" value="0" min="0">
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                            <button type="submit" class="btn btn-success">登録する</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- モーダル: ユーザー削除確認 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title">ユーザー削除の確認</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>本当にユーザー <strong id="deleteTargetName"></strong> を削除しますか？<br>
                        <span class="text-danger small">※このユーザーの勤怠データもすべて削除されます。</span></p>
                        
                        <form action="/admin/delete-user" method="post">
                            <input type="hidden" name="filterUserId" th:value="${selectedUserId}">
                            <input type="hidden" name="filterMonth" th:value="${selectedMonth}">
                            <input type="hidden" name="filterStartDate" th:value="${selectedStartDate}">
                            <input type="hidden" name="filterEndDate" th:value="${selectedEndDate}">
                            
                            <input type="hidden" name="targetId" id="deleteTargetId">
                            <div class="mb-3">
                                <label class="form-label fw-bold">管理者のパスワードを入力</label>
                                <input type="password" name="adminPassword" class="form-control" required>
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                                <button type="submit" class="btn btn-danger">削除実行</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- 1. 新規ユーザー登録のパスワード表示切り替え ---
            const toggleRegPassword = document.getElementById('toggleRegPassword');
            const regPasswordField = document.getElementById('regPassword');
            const regEyeIcon = document.getElementById('regEyeIcon');

            if (toggleRegPassword && regPasswordField) {
                toggleRegPassword.addEventListener('click', () => {
                    const type = regPasswordField.type === 'password' ? 'text' : 'password';
                    regPasswordField.type = type;
                    regEyeIcon.classList.toggle('bi-eye-slash');
                    regEyeIcon.classList.toggle('bi-eye');
                });
            }

            // --- 2. 全角→半角変換ロジック (高精度版) ---
            const normalizeInput = (el) => {
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const value = el.value;
                const result = value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                
                if (value !== result) {
                    el.value = result;
                    el.setSelectionRange(start, end);
                }
            };

            const targetFields = [document.getElementById('regName'), regPasswordField];
            targetFields.forEach(field => {
                if (!field) return;
                field.addEventListener('input', (e) => {
                    if (!e.isComposing) normalizeInput(field);
                });
                field.addEventListener('compositionend', () => normalizeInput(field));
                field.addEventListener('blur', () => normalizeInput(field));
            });
        });

        function setDeleteTarget(button) {
            var id = button.getAttribute('data-id');
            var name = button.getAttribute('data-name');
            document.getElementById('deleteTargetId').value = id;
            document.getElementById('deleteTargetName').textContent = name;
        }

        function onMonthChange() {
            document.getElementById('startDateInput').value = '';
            document.getElementById('endDateInput').value = '';
            document.getElementById('filterForm').submit();
        }

        function onDateChange() {
            document.getElementById('monthInput').value = '';
            var start = document.getElementById('startDateInput').value;
            var end = document.getElementById('endDateInput').value;
            if (start && end) {
                document.getElementById('filterForm').submit();
            }
        }

        let isDeleteMode = false;
        function toggleDeleteMode() {
            isDeleteMode = !isDeleteMode;
            const cols = document.querySelectorAll('.delete-col');
            const execBtn = document.getElementById('executeDeleteBtn');
            const modeBtn = document.getElementById('deleteModeBtn');

            cols.forEach(col => col.classList.toggle('d-none', !isDeleteMode));
            execBtn.classList.toggle('d-none', !isDeleteMode);

            if (isDeleteMode) {
                modeBtn.classList.remove('btn-outline-danger');
                modeBtn.classList.add('btn-danger');
                modeBtn.textContent = '❌ 削除モードOFF';
            } else {
                modeBtn.classList.remove('btn-danger');
                modeBtn.classList.add('btn-outline-danger');
                modeBtn.textContent = '🗑️ 削除モードON';
                document.querySelectorAll('.attendance-checkbox').forEach(cb => cb.checked = false);
                document.getElementById('selectAll').checked = false;
            }
        }

        function toggleAllCheckboxes(source) {
            const checkboxes = document.querySelectorAll('.attendance-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
        }
    </script>
</body>
</html>
