<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | Prime Worker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
<style>
    body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #333; }
    
    .login-container { 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 20px; /* スマホで画面端に張り付かないように余白を追加 */
    }
    
    .login-card { 
        background: #ffffff; 
        border: 1px solid #eaeaea; 
        border-radius: 12px; 
        padding: 40px; 
        width: 100%; 
        max-width: 400px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.02); 
    }
    
    .form-label { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 0.5rem; }
    
    /* font-sizeを16pxにすることで、iOS等のスマホで入力時に画面が自動拡大するのを防ぎます */
    .form-control { border-radius: 8px; padding: 12px 15px; border: 1px solid #ddd; font-size: 16px; }
    
    .password-toggle-btn { border: 1px solid #ddd; border-left: none; background: #fff; color: #888; border-radius: 0 8px 8px 0; padding: 0 15px; display: flex; align-items: center; transition: all 0.2s; }
    .password-toggle-btn:hover { color: #000; background: #fdfdfd; }
    
    .btn-primary { background-color: #1a1a1a; border: none; border-radius: 8px; padding: 12px; font-weight: 600; margin-top: 10px; }
    .alert { border-radius: 8px; font-size: 0.85rem; }
    .forgot-link { font-size: 0.85rem; color: #888; text-decoration: none; }

    /* --- スマホ・タブレット向けレスポンシブ設定 --- */
    @media (max-width: 576px) {
        .login-card { 
            padding: 25px;      /* スマホでは余白を少し詰める */
            box-shadow: none;   /* 影を消してフラットに */
            border: none;       /* 枠線も消すと画面に馴染みます */
        }
    }
</style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 15px;">
                <img th:src="@{/images/logo.png}" alt="Prime Worker Logo" style="width: 300px; height: auto;">
            </div>

            <div th:if="${param.error}" class="alert alert-danger bg-danger-subtle text-danger mb-4">
                <div th:if="${param.error[0] == 'already_logged_in'}">他の端末でログイン中のため、入れません。</div>
                <div th:if="${param.error[0] == 'user_not_found'}">ユーザーIDが存在しません。</div>
                <div th:if="${param.error[0] == 'invalid_password'}">パスワードが間違っています。</div>
                <div th:if="${param.error[0] == 'true'}">ログインに失敗しました。</div>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">ユーザーID または 名前</label>
                    <input type="text" name="loginInfo" id="loginInfo" class="form-control" placeholder="ユーザーID または 名前を入力" required autocomplete="username">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">パスワード</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control" 
                               inputmode="email" style="border-radius: 8px 0 0 8px;" placeholder="パスワードを入力" required autocomplete="current-password">
                        <button class="btn password-toggle-btn" type="button" id="togglePassword">
                            <i class="bi bi-eye-slash" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">ログイン</button>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/forgot-password}" class="forgot-link">パスワードを忘れた場合はこちら</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (togglePassword && passwordField) {
                togglePassword.addEventListener('click', () => {
                    const type = passwordField.type === 'password' ? 'text' : 'password';
                    passwordField.type = type;
                    eyeIcon.classList.toggle('bi-eye-slash');
                    eyeIcon.classList.toggle('bi-eye');
                });
            }

            const normalizeInput = (el) => {
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const value = el.value;
                const result = value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                
                if (value !== result) {
                    el.value = result;
                    el.setSelectionRange(start, end);
                }
            };

            const fields = [document.getElementById('loginInfo'), passwordField];
            fields.forEach(field => {
                if (!field) return;
                field.addEventListener('input', (e) => { if (!e.isComposing) normalizeInput(field); });
                field.addEventListener('compositionend', () => normalizeInput(field));
                field.addEventListener('blur', () => normalizeInput(field));
            });
        });
    </script>
</body>
</html>
