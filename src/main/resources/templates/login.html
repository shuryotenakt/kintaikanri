<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Login | Prime Worker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #333; }
        .login-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .login-card { background: #ffffff; border: 1px solid #eaeaea; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .form-label { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 0.5rem; }
        .form-control { border-radius: 8px; padding: 12px 15px; border: 1px solid #ddd; font-size: 0.95rem; }
        .password-toggle-btn { border: 1px solid #ddd; border-left: none; background: #fff; color: #888; border-radius: 0 8px 8px 0; padding: 0 15px; display: flex; align-items: center; transition: all 0.2s; }
        .password-toggle-btn:hover { color: #000; background: #fdfdfd; }
        .btn-primary { background-color: #1a1a1a; border: none; border-radius: 8px; padding: 12px; font-weight: 600; margin-top: 10px; }
        .alert { border-radius: 8px; font-size: 0.85rem; }
        .forgot-link { font-size: 0.85rem; color: #888; text-decoration: none; }
        
        /* 💡 言語切り替えリンクのスタイリング */
        .lang-switcher { position: absolute; top: 20px; right: 20px; font-size: 0.85rem; }
        .lang-link { color: #666; text-decoration: none; font-weight: 600; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
        .lang-link:hover { color: #000; background-color: #e9ecef; }
        .lang-link.active { color: #000; pointer-events: none; text-decoration: underline; text-underline-offset: 4px; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="lang-switcher">
            <a th:href="@{/change-lang(locale='ja', redirect='/')}" class="lang-link" th:classappend="${#locale.toString().startsWith('ja')} ? 'active'">日本語</a>
            <span class="text-muted">|</span>
            <a th:href="@{/change-lang(locale='en', redirect='/')}" class="lang-link" th:classappend="${#locale.toString().startsWith('en')} ? 'active'">English</a>
        </div>

        <div class="login-card">
            <div style="text-align: center; margin-bottom: 15px;">
                <img th:src="@{/images/logo.png}" alt="Prime Worker Logo" style="width: 300px; height: auto;">
            </div>

            <div th:if="${param.error}" class="alert alert-danger bg-danger-subtle text-danger mb-4">
                <div th:if="${param.error[0] == 'already_logged_in'}" th:text="#{login.error.alreadyLoggedIn}">他の端末でログイン中のため、入れません。</div>
                <div th:if="${param.error[0] == 'user_not_found'}" th:text="#{login.error.userNotFound}">ユーザーIDが存在しません。</div>
                <div th:if="${param.error[0] == 'invalid_password'}" th:text="#{login.error.invalidPassword}">パスワードが間違っています。</div>
                <div th:if="${param.error[0] == 'true'}" th:text="#{login.error.generic}">ログインに失敗しました。</div>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{login.label.username}">ユーザーID または 名前</label>
                    <input type="text" name="loginInfo" id="loginInfo" class="form-control" th:placeholder="#{login.placeholder.username}" placeholder="User ID or name" required autocomplete="username">
                </div>
                
                <div class="mb-4">
                    <label class="form-label" th:text="#{login.label.password}">パスワード</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control" 
                               inputmode="email" style="border-radius: 8px 0 0 8px;" th:placeholder="#{login.placeholder.password}" placeholder="Password" required autocomplete="current-password">
                        <button class="btn password-toggle-btn" type="button" id="togglePassword">
                            <i class="bi bi-eye-slash" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" th:text="#{login.btn.submit}">ログイン</button>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/forgot-password}" class="forgot-link" th:text="#{login.link.forgotPassword}">パスワードを忘れた場合はこちら</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            // 1. パスワード表示切り替え
            if (togglePassword && passwordField) {
                togglePassword.addEventListener('click', () => {
                    const type = passwordField.type === 'password' ? 'text' : 'password';
                    passwordField.type = type;
                    eyeIcon.classList.toggle('bi-eye-slash');
                    eyeIcon.classList.toggle('bi-eye');
                });
            }

            // 2. 重複防止・即時半角変換ロジック
            const normalizeInput = (el) => {
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const value = el.value;
                
                // 全角数字を半角に置換
                const result = value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                
                if (value !== result) {
                    el.value = result;
                    // 置換後にカーソル位置が飛ばないように制御
                    el.setSelectionRange(start, end);
                }
            };

            const fields = [document.getElementById('loginInfo'), passwordField];

            fields.forEach(field => {
                if (!field) return;

                // inputイベント: 入力が発生した瞬間に実行
                field.addEventListener('input', (e) => {
                    // IME入力中（未確定）はブラウザの挙動に任せ、確定した瞬間に置換
                    if (!e.isComposing) {
                        normalizeInput(field);
                    }
                });

                // compositionend: 日本語入力が確定した瞬間に実行（これで重複を防ぐ）
                field.addEventListener('compositionend', () => {
                    normalizeInput(field);
                });

                // blur: 念のため離れたときも実行
                field.addEventListener('blur', () => {
                    normalizeInput(field);
                });
            });
        });
    </script>
</body>
</html>
