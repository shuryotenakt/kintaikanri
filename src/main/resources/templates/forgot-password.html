<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード再設定 | Prime Worker</title>
    <!-- CSS: Bootstrap 5 & Inter Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
    /* 共通設定 */
    body {
        background-color: #f8f9fa;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #333;
        margin: 0; /* スマホでの余計な隙間を防ぐ */
    }
    
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px; /* スマホで画面端に張り付かないように余白を確保 */
    }
    
    .login-card {
        background: #ffffff;
        border: 1px solid #eaeaea;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.02);
    }
    
    .form-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #666;
        margin-bottom: 0.5rem;
    }
    
    /* 重要：iOS等のスマホで入力時に画面が自動拡大するのを防ぐため 16px を指定 */
    .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 1px solid #ddd;
        font-size: 16px; 
        transition: all 0.2s;
    }
    .form-control:focus {
        border-color: #000;
        box-shadow: none;
    }
    
    .password-toggle-btn {
        border: 1px solid #ddd;
        border-left: none;
        background: #fff;
        color: #888;
        border-radius: 0 8px 8px 0;
        padding: 0 15px;
        display: flex;
        align-items: center;
        transition: all 0.2s;
        cursor: pointer;
    }
    .password-toggle-btn:hover {
        color: #000;
        background: #fdfdfd;
    }
    
    .btn-primary {
        background-color: #1a1a1a;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 10px;
        width: 100%;
    }
    .btn-primary:hover {
        background-color: #333;
    }
    
    .alert {
        border-radius: 8px;
        border: none;
        font-size: 0.85rem;
    }
    
    .forgot-link {
        font-size: 0.85rem;
        color: #888;
        text-decoration: none;
        transition: color 0.2s;
    }
    .forgot-link:hover {
        color: #000;
    }

    /* --- レスポンシブ調整（スマホ対応） --- */
    @media (max-width: 576px) {
        .login-card {
            padding: 25px;      /* スマホ時は余白を少し詰める */
            box-shadow: none;   /* スマホでは影を消してスッキリさせる */
            border-radius: 8px; /* 角丸を少し小さく */
        }
    }
</style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div style="text-align: center; margin-top:-5px; margin-bottom: 15px;">
                <img src="/images/logo.png" alt="Prime Worker Logo" style="width: 300px; height: auto;">
            </div>

            <div style="font-weight: 700; font-size: 1.2rem; text-align: center; margin-bottom: 1.5rem; color: #1a1a1a;">
                パスワード再設定
            </div>

            <!-- エラー表示エリア -->
            <div th:if="${param.error}" class="alert alert-danger bg-danger-subtle text-danger mb-4">
                <span th:if="${param.error[0] == 'user_not_found'}">ユーザーIDが登録されていません。</span>
                <span th:if="${param.error[0] == 'name_mismatch'}">IDと名前の組み合わせが一致しません。</span>
                <!-- 🌟 全角文字エラーの表示枠を追加 -->
                <span th:if="${param.error[0] == 'invalid_characters'}">パスワードに全角文字や使用できない文字が含まれています。</span>
                <span th:if="${param.error[0] == 'password_mismatch'}">確認用パスワードが一致しません。</span>
                <span th:if="${param.error[0] == 'same_as_old'}">以前と同じパスワードは使用できません。</span>
            </div>

            <form action="/reset-password" method="post">
                <!-- ユーザーID -->
                <div class="mb-3">
                    <label class="form-label">ユーザーID</label>
                    <input type="text" name="userId" id="userId" class="form-control" placeholder="User ID" required autocomplete="username">
                </div>
                
                <!-- 登録名 -->
                <div class="mb-3">
                    <label class="form-label">登録名（名前）</label>
                    <input type="text" name="name" class="form-control" placeholder="User name" required>
                </div>
                
                <!-- 新しいパスワード -->
                <div class="mb-3">
                    <label class="form-label">新しいパスワード</label>
                    <div class="input-group">
                        <input type="password" name="newPassword" id="newPassword" class="form-control" 
                               inputmode="email" style="border-radius: 8px 0 0 8px;" placeholder="New password" required autocomplete="new-password">
                        <button class="btn password-toggle-btn" type="button" id="toggleNewPassword">
                            <i class="bi bi-eye-slash" id="eyeIconNew"></i>
                        </button>
                    </div>
                </div>
                
                <!-- 確認用パスワード -->
                <div class="mb-4">
                    <label class="form-label">新しいパスワード(再入力)</label>
                    <div class="input-group">
                        <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" 
                               inputmode="email" style="border-radius: 8px 0 0 8px;" placeholder="Confirm password" required autocomplete="new-password">
                        <button class="btn password-toggle-btn" type="button" id="toggleConfirmPassword">
                            <i class="bi bi-eye-slash" id="eyeIconConfirm"></i>
                        </button>
                    </div>
                </div>
                                                     
                <button type="submit" class="btn btn-primary w-100">パスワードを更新する</button>
            </form>

            <div class="text-center mt-4">
                <a href="/" class="forgot-link">ログイン画面に戻る</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- 1. パスワード表示切り替えの共通設定 ---
            const setupToggle = (btnId, fieldId, iconId) => {
                const btn = document.getElementById(btnId);
                const field = document.getElementById(fieldId);
                const icon = document.getElementById(iconId);

                if (btn && field && icon) {
                    btn.addEventListener('click', () => {
                        const type = field.type === 'password' ? 'text' : 'password';
                        field.type = type;
                        icon.classList.toggle('bi-eye-slash');
                        icon.classList.toggle('bi-eye');
                    });
                }
            };

            setupToggle('toggleNewPassword', 'newPassword', 'eyeIconNew');
            setupToggle('toggleConfirmPassword', 'confirmPassword', 'eyeIconConfirm');

            // --- 2. 高精度な全角→半角変換ロジック（オリジナルの仕様をそのまま維持） ---
            const normalizeInput = (el) => {
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const value = el.value;
                
                // 全角数字を半角に置換
                const result = value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                
                if (value !== result) {
                    el.value = result;
                    // 置換後にカーソル位置を復元
                    el.setSelectionRange(start, end);
                }
            };

            // 対象とするフィールド（ユーザーID、パスワード2種）
            const fields = [
                document.getElementById('userId'), 
                document.getElementById('newPassword'), 
                document.getElementById('confirmPassword')
            ];

            fields.forEach(field => {
                if (!field) return;

                // 入力した瞬間に実行（IME未確定文字はブラウザに任せ、確定時に変換）
                field.addEventListener('input', (e) => {
                    if (!e.isComposing) {
                        normalizeInput(field);
                    }
                });

                // 日本語入力が確定した瞬間に実行
                field.addEventListener('compositionend', () => {
                    normalizeInput(field);
                });

                // フォーカスが外れた際も念のため実行
                field.addEventListener('blur', () => {
                    normalizeInput(field);
                });
            });
        });
    </script>
</body>
</html>
